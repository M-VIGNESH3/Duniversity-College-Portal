apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb-deploy
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: mariadb
        image: mariadb:10.5
        ports:
        - containerPort: 3306

        envFrom:
        - configMapRef:
            name: col-cfg

        volumeMounts:
        - name: mariadb-storage
          mountPath: /var/lib/mysql
        - name: schema-volume
          mountPath: /docker-entrypoint-initdb.d/  

      volumeClaimTemplates:
        metadata:
          name: mariadb-storage 
        spec:
          storageClassName: nfs-client-mariadb
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 2Gi
      # volumes:
      # - name: mariadb-storage
      #   persistentVolumeClaim:
      #     claimName: mariadb-pvc
      # - name: schema-volume
      #   configMap:
      #     name: mariadb-schema
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
spec:
  selector:
    app: mariadb
  ports:
    - port: 3306
      targetPort: 3306
  ClusterIP: None

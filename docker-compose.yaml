# version removed because Compose v2 ignores it

services:
  collage-portal:
    build:
      context: .                        # build from project root
    container_name: c-p
    ports:
      - "81:3000"
    env_file:
      - ./.env
    depends_on:
      data-base:
        condition: service_healthy
    networks:
      - appnet

  data-base:
    image: mariadb:11.4
    container_name: data
    environment:
      MARIADB_ROOT_PASSWORD: root123
      MARIADB_DATABASE: college_db
      MARIADB_USER: appuser
      MARIADB_PASSWORD: apppass
    ports:
      - "3306:3306"
    volumes:
      - data1:/var/lib/mysql        # correct mariadb data dir
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      appnet:
        aliases:
          - mariadb                 # this fixes your ENOTFOUND error

volumes:
  data1: {}

networks:
  appnet:
    driver: bridge

version: '3.8'

services:
  collage-portal:
    build: /home/ubuntu/Duniversity-College-Portal/public/college-portal
    container_name: c-p
    ports:
      - "81:3000"
    env_file:
      - ./.env 
    depends_on:
      - data-base
    
  data-base:
    image: mariadb:11.4
    container_name: data
    environment:
      MARIADB_ROOT_PASSWORD: root123
      MARIADB_DATABASE: college_db
    ports:
      - "3306:3306"

    volumes:
      - data1:/var/lib/data1

volumes:
  data1: {}









